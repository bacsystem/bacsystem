@if (showClients) {
  <section id="clients" class="clients section light-background">
    <div class="container" data-aos="fade-up">
      <div class="clients-slider">
        <div class="clients-track">
          <!-- Original set -->
          @for (client of clients; track client.src) {
            <div class="client-logo">
              <img
                [ngSrc]="client.src"
                class="img-fluid"
                [alt]="client.alt"
                [width]="client.width"
                [height]="client.height"
              />
            </div>
          }

          <!-- Duplicate for seamless loop -->
          @for (client of clients; track client.src) {
            <div class="client-logo">
              <img
                [ngSrc]="client.src"
                class="img-fluid"
                [alt]="client.alt"
                [width]="client.width"
                [height]="client.height"
              />
            </div>
          }
        </div>
      </div>
    </div>
  </section>
}
